name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Seed generic example data
        run: npm run seed

      - name: Start server and run the smoke + concurrency tests
        run: |
          npm start &
          for i in $(seq 1 40); do curl -sf http://localhost:8791/health >/dev/null && break; sleep 0.25; done
          npm test
          npm run test:concurrency

      - name: Run the end-to-end demo (isolated server)
        run: npm run demo

      - name: Adversarial fuzz (server must survive every hostile input)
        run: npm run fuzz
