<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>agent-ops</title>
<style>
 :root{--bg:#eef0f3;--panel:#fff;--ink:#181b20;--ink2:#434955;--muted:#727a86;--faint:#9aa1ac;--rule:#e7e9ee;
  --accent:#1f3b63;--accent2:#2f5f8a;--accent-soft:#eef3f9;--do:#0f6e57;--p1:#c0392b;--p2:#b7791f;--p3:#7a828e;
  --sans:'Segoe UI',-apple-system,Arial,sans-serif;--mono:'SF Mono',Consolas,monospace;}
 *{box-sizing:border-box;}html,body{margin:0;}body{background:var(--bg);font-family:var(--sans);color:var(--ink);font-size:14px;}
 .wrap{max-width:1060px;margin:0 auto;padding:22px 18px 60px;}
 .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent2);}
 h1{font-size:25px;font-weight:800;margin:2px 0;} .sub{color:var(--muted);font-size:12.5px;}
 .controls{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 4px;}
 .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:9px;padding:7px 15px;font-size:13px;font-weight:700;cursor:pointer;}
 .btn.ghost{background:#fff;color:var(--accent);}
 .tabs{display:flex;gap:6px;margin:14px 0;flex-wrap:wrap;}
 .tab{border:1px solid var(--rule);background:var(--panel);color:var(--ink2);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;text-transform:capitalize;}
 .tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
 .card{background:var(--panel);border:1px solid var(--rule);border-radius:12px;padding:14px 16px;margin-bottom:9px;}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
 .k{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
 .chip{display:inline-block;font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px;margin:2px 3px 2px 0;background:var(--accent-soft);color:var(--accent);}
 .chip.cat{background:#f0f1f5;color:var(--muted);}
 .op{cursor:pointer;} .op:hover{border-color:var(--accent2);}
 .opname{font-weight:800;color:var(--accent);font-size:15px;} .opsum{color:var(--ink2);font-size:13px;margin-top:2px;}
 pre{background:#f7f8fa;border:1px solid var(--rule);border-radius:8px;padding:12px;font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;color:var(--ink2);margin:8px 0 0;}
 .kpis{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
 .kpi{background:var(--panel);border:1px solid var(--rule);border-radius:10px;padding:9px 15px;text-align:center;min-width:84px;}
 .kpi .n{font-size:21px;font-weight:800;} .kpi .l{font-size:10.5px;color:var(--muted);}
 select,input{border:1px solid var(--rule);border-radius:8px;padding:7px 11px;font-family:inherit;font-size:13px;}
 .row{display:flex;gap:10px;align-items:baseline;padding:9px 0;border-bottom:1px solid #f1f2f6;}
 .pri{font-size:10.5px;font-weight:800;border-radius:6px;padding:1px 6px;} .pri.p1{background:#fbecea;color:var(--p1);} .pri.p2{background:#fbf3e0;color:var(--p2);} .pri.p3{background:#eef0f3;color:var(--p3);}
 .own{font-size:11px;font-weight:700;border-radius:20px;padding:1px 8px;background:#f0f1f5;color:var(--muted);}
 .muted{color:var(--muted);font-size:12.5px;} .mono{font-family:var(--mono);font-size:12px;color:var(--muted);}
 #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;}
 #toast.on{opacity:1;}
</style></head><body><div class="wrap">
 <div class="eyebrow">agent-ops</div><h1 id="title">agent-ops</h1><div class="sub" id="sub">connecting...</div>
 <div class="controls" id="controls"></div>
 <div class="tabs" id="tabs"></div>
 <div id="view"></div>
</div><div id="toast"></div>
<script>
var L={en:{overview:'overview',operations:'operations',knowledge:'knowledge',tasks:'tasks',activity:'activity',protocol:'protocol',active:'active',done:'done',records:'records',components:'components',needs:'needs',noconn:'No connection. Run: node server.mjs',auditlog:'action log (audit)',traces:'traces (root-cause)',empty:'nothing yet',category:'category',search:'search...',rootcause:'root-cause',culprit:'likely culprit',nofails:'no failing chains logged, nothing to root-cause',filterops:'filter operations...',graphissues:'graph issues',missingdep:'missing dep',missingop:'missing op',listview:'list',mapview:'map',roots:'entry points (not used as a dependency)',cycle:'cycle',markdone:'mark done'},
     he:{overview:'סקירה',operations:'פעולות',knowledge:'ידע',tasks:'משימות',activity:'פעילות',protocol:'הפרוטוקול',active:'פעילות',done:'הושלמו',records:'רשומות',components:'רכיבים',needs:'צריך',noconn:'אין חיבור. הרץ: node server.mjs',auditlog:'יומן-פעולות (audit)',traces:'טרייסים (root-cause)',empty:'אין עדיין',category:'קטגוריה',search:'חיפוש...',rootcause:'ניתוח-שורש',culprit:'החשוד המרכזי',nofails:'אין שרשראות-כושלות ביומן, אין מה לנתח',filterops:'סינון פעולות...',graphissues:'בעיות בגרף',missingdep:'תלות חסרה',missingop:'פעולה חסרה',listview:'רשימה',mapview:'מפה',roots:'נקודות-כניסה (לא בשימוש כתלות)',cycle:'מעגל',markdone:'סמן בוצע'}};
var UI={title:'agent-ops',lang:'en',tabs:['overview','operations','knowledge','tasks','activity'],buttons:[]},M=null,cur='overview',t=L.en;
function tab(x){cur=x;try{location.hash=x;}catch(e){}render();}
async function j(u){var r=await fetch(u);return r.json();}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('on');setTimeout(function(){e.classList.remove('on');},1800);}
async function act(action,payload){try{var r=await fetch('/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:action,payload:payload||{},chat:'ui'})});var jr=await r.json();toast(jr.ok?(action+' ✓'):(jr.error||'error'));render();}catch(e){toast('error: '+e.message);}}
async function boot(){
 try{UI=Object.assign(UI,await j('/ui'));}catch(e){}
 t=L[UI.lang]||L.en; document.dir=UI.lang==='he'?'rtl':'ltr';
 document.getElementById('title').textContent=UI.title||'agent-ops';
 try{M=await j('/manifest');document.getElementById('sub').textContent=M.operations.length+' operations · '+M.components.length+' components · '+M.knowledgeCategories.length+' knowledge categories';}catch(e){document.getElementById('sub').textContent=t.noconn;}
 // agent-defined buttons
 document.getElementById('controls').innerHTML=(UI.buttons||[]).map(function(b,i){return '<button class="btn" data-i="'+i+'">'+esc(b.label)+'</button>';}).join('');
 document.querySelectorAll('#controls .btn').forEach(function(el){el.onclick=function(){var b=UI.buttons[el.getAttribute('data-i')];act(b.action,b.payload);};});
 var hash=(location.hash||'').replace('#','');
 if(hash&&UI.tabs.indexOf(hash)>=0)cur=hash;
 else if(!cur||UI.tabs.indexOf(cur)<0)cur=UI.tabs[0]||'overview';
 document.getElementById('tabs').innerHTML=(UI.tabs||[]).map(function(x){return '<button class="tab'+(cur===x?' on':'')+'" onclick="tab(\''+x+'\')">'+(t[x]||x)+'</button>';}).join('');
 render();
}
function render(){
 document.querySelectorAll('#tabs .tab').forEach(function(b){b.className='tab'+(b.textContent===(t[cur]||cur)?' on':'');});
 var v=document.getElementById('view');
 if(cur==='overview')return renderOverview(v);
 if(cur==='operations')return renderOps(v);
 if(cur==='knowledge')return renderKnowledge(v);
 if(cur==='tasks')return renderTasks(v);
 if(cur==='activity')return renderActivity(v);
 v.innerHTML='<div class="card muted">'+esc(cur)+'</div>';
}
async function renderOverview(v){if(!M){v.innerHTML='<div class="card">'+t.noconn+'</div>';return;}
 var byCat={};M.components.forEach(function(c){(byCat[c.category]=byCat[c.category]||[]).push(c);});
 var h='<div class="kpis"><div class="kpi"><div class="n">'+M.operations.length+'</div><div class="l">'+t.operations+'</div></div><div class="kpi"><div class="n">'+M.components.length+'</div><div class="l">'+t.components+'</div></div><div class="kpi"><div class="n">'+M.counts.tasks+'</div><div class="l">'+t.tasks+'</div></div><div class="kpi"><div class="n">'+M.counts.records+'</div><div class="l">'+t.records+'</div></div></div>';
 h+='<div class="card"><div class="k">'+t.protocol+'</div><pre>'+esc(M.protocol)+'</pre></div>';
 h+='<div class="card"><div class="k">'+t.knowledge+'</div>'+((M.knowledgeCategories||[]).map(function(c){return '<span class="chip" style="cursor:pointer" onclick="tab(\'knowledge\')">'+esc(c.category)+' <b>'+c.n+'</b></span>';}).join('')||'<span class="muted">'+t.empty+'</span>')+'</div>';
 h+='<div class="grid">';
 Object.keys(byCat).forEach(function(cat){h+='<div class="card"><div class="k">'+esc(cat)+'</div>'+byCat[cat].map(function(c){return '<div style="margin-bottom:7px"><b>'+esc(c.name)+'</b> <span class="muted">'+esc(c.description||'')+'</span></div>';}).join('')+'</div>';});
 v.innerHTML=h+'</div>';
 try{var l=await j('/lint');if(l&&!l.ok){var w='<div class="card" style="border-color:var(--p1)"><div class="k" style="color:var(--p1)">⚠ '+(t.graphissues||'graph issues')+'</div>'+l.missingDeps.map(function(m){return '<div class="row"><span class="chip">'+esc(m.operation)+'</span><span class="muted" style="flex:1">'+(t.missingdep||'missing dep')+': '+esc(m.missingDep)+'</span></div>';}).join('')+l.danglingComponentOps.map(function(d){return '<div class="row"><span class="chip">'+esc(d.component)+'</span><span class="muted" style="flex:1">'+(t.missingop||'missing op')+': '+esc(d.missingOp)+'</span></div>';}).join('')+'</div>';v.insertAdjacentHTML('afterbegin',w);}}catch(e){}}
var _ops=[],_opmode='list',_exp=null;
async function renderOps(v){_ops=await j('/ops');
 v.innerHTML='<div class="card" style="display:flex;gap:8px;align-items:center">'
  +'<input id="opq" placeholder="'+t.filterops+'" style="flex:1" oninput="if(_opmode===\'list\')drawOps()">'
  +'<button id="mList" class="tab" onclick="setOpMode(\'list\')">'+t.listview+'</button>'
  +'<button id="mMap" class="tab" onclick="setOpMode(\'map\')">'+t.mapview+'</button></div><div id="opres"></div>';
 setOpMode(_opmode);}
function setOpMode(m){_opmode=m;var a=document.getElementById('mList'),b=document.getElementById('mMap');
 if(a)a.className='tab'+(m==='list'?' on':'');if(b)b.className='tab'+(m==='map'?' on':'');drawOps();}
function drawOps(){if(_opmode==='map')return drawMap();
 var q=(document.getElementById('opq')&&document.getElementById('opq').value||'').toLowerCase();
 var list=_ops.filter(function(o){return !q||(o.name+' '+o.category+' '+(o.summary||'')).toLowerCase().indexOf(q)>=0;});
 document.getElementById('opres').innerHTML=list.map(function(o){return '<div class="card op" onclick="showOp(\''+o.name+'\',this)"><div class="opname">'+esc(o.name)+' <span class="chip cat">'+esc(o.category)+'</span> <span class="muted">v'+o.version+'</span></div><div class="opsum">'+esc(o.summary)+'</div><div class="opbody"></div></div>';}).join('')||'<div class="card muted">'+(_ops.length?t.empty:'no operations, run <b>node seed.mjs</b>')+'</div>';}
async function drawMap(){if(!_exp)_exp=await j('/export');
 var byName={};(_exp.operations||[]).forEach(function(o){byName[o.name]=o;});
 var depSet={};(_exp.operations||[]).forEach(function(o){(o.deps||[]).forEach(function(d){depSet[d]=1;});});
 var roots=(_exp.operations||[]).filter(function(o){return !depSet[o.name];});
 function node(name,depth,seen){var pad='padding-inline-start:'+(depth*20)+'px';
  if(seen[name])return '<div style="'+pad+'" class="muted">↳ '+esc(name)+' ('+t.cycle+')</div>';
  var s={};for(var k in seen)s[k]=1;s[name]=1;var op=byName[name];
  var h='<div style="'+pad+';padding-top:3px;padding-bottom:3px">'+(depth?'<span class="muted">↳ </span>':'')+'<span class="chip">'+esc(name)+'</span> <span class="muted">'+esc(op?(op.summary||''):'?')+'</span></div>';
  if(op&&op.deps)op.deps.forEach(function(d){h+=node(d,depth+1,s);});return h;}
 document.getElementById('opres').innerHTML='<div class="card"><div class="muted" style="margin-bottom:6px">'+t.roots+'</div>'+(roots.length?roots.map(function(r){return node(r.name,0,{});}).join('<hr style="border:none;border-top:1px solid var(--rule);margin:8px 0">'):'<span class="muted">'+t.empty+'</span>')+'</div>';}
async function showOp(name,el){var b=el.querySelector('.opbody');if(b.innerHTML){b.innerHTML='';return;}var o=await j('/op/'+encodeURIComponent(name));b.innerHTML='<pre>'+esc(o.prompt)+'</pre>'+(o.deps&&o.deps.length?'<div style="margin-top:6px">'+t.needs+': '+o.deps.map(function(d){return '<span class="chip">'+esc(d)+'</span>';}).join('')+'</div>':'');}
async function renderKnowledge(v){var cats=(M&&M.knowledgeCategories)||[];
 v.innerHTML='<div class="card"><span class="muted">'+t.category+': </span><select id="kcat" onchange="loadK()"><option value="">*</option>'+cats.map(function(c){return '<option value="'+esc(c.category)+'">'+esc(c.category)+' ('+c.n+')</option>';}).join('')+'</select> <input id="kq" placeholder="'+t.search+'" oninput="loadK()"></div><div id="kres"></div>';loadK();}
async function loadK(){var cat=document.getElementById('kcat').value,q=document.getElementById('kq').value;var rows=await j('/knowledge?'+(cat?'category='+encodeURIComponent(cat):'')+(q?'&q='+encodeURIComponent(q):''));
 document.getElementById('kres').innerHTML=rows.map(function(r){return '<div class="card"><div class="k">'+esc(r.category)+' · '+esc(r.key)+'</div><div class="opsum">'+esc(r.value)+'</div></div>';}).join('')||'<div class="muted">'+t.empty+'</div>';}
async function renderTasks(v){var ts=await j('/tasks');var active=ts.filter(function(x){return x.status!=='done';});
 v.innerHTML='<div class="kpis"><div class="kpi"><div class="n">'+active.length+'</div><div class="l">'+t.active+'</div></div><div class="kpi"><div class="n">'+ts.filter(function(x){return x.status==='done';}).length+'</div><div class="l">'+t.done+'</div></div></div><div class="card">'+active.map(function(x){return '<div class="row"><span class="pri p'+(x.priority||2)+'">P'+(x.priority||2)+'</span><span class="own">'+esc(x.owner)+'</span><span class="chip cat">'+esc(x.stream)+'</span><span style="flex:1">'+esc(x.title)+'</span>'+(x.deadline?'<span class="mono">'+esc(x.deadline)+'</span>':'')+'<button class="btn ghost" title="'+(t.markdone||'done')+'" style="padding:1px 9px;font-size:12px;line-height:1.4" onclick="event.stopPropagation();act(\'task.done\',{id:'+x.id+'})">✓</button></div>';}).join('')+'</div>';}
async function renderActivity(v){var log=await j('/log'),tr=await j('/traces'),rc=await j('/root-cause');
 var rcCard='<div class="card"><div class="k">'+t.rootcause+'</div>';
 if(rc.likelyCulprit){rcCard+='<div style="margin-bottom:8px"><span class="muted">'+t.culprit+': </span><span class="opname">'+esc(rc.likelyCulprit.operation)+'</span> <span class="muted">('+rc.failingTraces+'/'+rc.totalTraces+' failing)</span></div>'+
   '<div class="muted" style="margin-bottom:8px">'+esc(rc.likelyCulprit.hint)+'</div>'+
   rc.culpritRanking.slice(0,6).map(function(s){return '<div class="row"><span class="chip">'+esc(s.name)+'</span><span class="muted" style="flex:1">ends '+s.endedChain+' · in '+s.inFailingChains+' failing chains</span><span class="pri p1">'+s.score+'</span></div>';}).join('');}
 else rcCard+='<div class="muted">'+t.nofails+'</div>';
 rcCard+='</div>';
 v.innerHTML=rcCard+'<div class="card"><div class="k">'+t.auditlog+'</div>'+(log.length?log.slice(0,40).map(function(a){return '<div class="row"><span class="mono">'+esc((a.ts||'').slice(11,16))+'</span><span class="chip">'+esc(a.action)+'</span><span class="muted" style="flex:1">'+esc((a.payload||'').slice(0,80))+'</span></div>';}).join(''):'<div class="muted">'+t.empty+'</div>')+'</div><div class="card"><div class="k">'+t.traces+'</div>'+(tr.length?tr.slice(0,20).map(function(x){return '<div class="row"><span class="chip">'+esc(x.op)+'</span><span class="chip cat">'+esc(x.status)+'</span><span class="muted" style="flex:1">'+esc(x.note||'')+'</span></div>';}).join(''):'<div class="muted">'+t.empty+'</div>')+'</div>';}
boot();
</script></body></html>
